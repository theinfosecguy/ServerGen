services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: servergen
      POSTGRES_USER: servergen
      POSTGRES_PASSWORD: servergen
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servergen -d servergen"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

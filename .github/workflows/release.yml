name: Release

# Release pipeline:
# 1) smoke: pack, install the tarball, scaffold Node and Express apps, boot their
#    servers and verify a live HTTP response. Kept out of the per-PR ci.yml job.
# 2) publish: on a version tag, publish to npm using OIDC trusted publishing
#    (no long-lived token; provenance is attached automatically).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run package smoke test
        run: npm run test:package

  publish:
    needs: smoke
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Explicit --tag latest: an old 2.0.0 exists on the registry, so npm will
      # not implicitly move the latest tag onto the lower (but newer) 1.3.0.
      - name: Publish to npm
        run: npm publish --tag latest
